server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Reverse proxy: Solver REST API
  location /api/ {
    proxy_pass http://solver:3001/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy WebSocket RPC through same origin to avoid client-side cross-network issues.
  location /ws {
    resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
    set $asset_hub_ws https://sys.ibp.network/asset-hub-paseo;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host sys.ibp.network;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_pass $asset_hub_ws;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }
}
